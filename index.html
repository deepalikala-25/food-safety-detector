<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Safety AI Detector</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #43cea2, #185a9d);
    color: white;
    text-align: center;
}

/* HEADER */
header {
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
}

/* CARD UI */
.card {
    background: white;
    color: black;
    margin: 20px auto;
    padding: 20px;
    width: 90%;
    max-width: 360px;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    animation: fadeIn 0.8s ease;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* INPUT */
input {
    padding: 10px;
    width: 90%;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* BUTTON */
button {
    padding: 12px;
    margin: 10px;
    border: none;
    background: #28a745;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
}

button:hover {
    background: #218838;
}

/* MEDIA */
video, canvas {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

/* HIDDEN */
.hidden {
    display: none;
}
</style>

</head>

<body>

<header>🍽 Food Safety AI Detector</header>

<!-- LOGIN PAGE -->
<div class="card" id="loginPage">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Enter your name">
    <button onclick="login()">Enter</button>
</div>

<!-- HOME PAGE -->
<div class="card hidden" id="homePage">
    <h2 id="welcomeText"></h2>
    <p>Scan food to detect contamination</p>
    <button onclick="startCamera()">📷 Scan Food</button>
</div>

<!-- CAMERA PAGE -->
<div class="card hidden" id="cameraPage">
    <h2>Camera</h2>
    <video id="video" autoplay playsinline></video>
    <button onclick="captureImage()">Capture</button>
</div>

<!-- RESULT PAGE -->
<div class="card hidden" id="resultPage">
    <h2>Analysis Result</h2>
    <canvas id="canvas"></canvas>
    <p id="resultText"></p>
    <button onclick="speakResult()">🔊 Speak</button>
    <button onclick="goHome()">Home</button>
</div>

<script>
let video = document.getElementById("video");

/* LOGIN */
function login() {
    let name = document.getElementById("username").value;

    if (name === "") {
        alert("Please enter your name!");
        return;
    }

    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("homePage").classList.remove("hidden");

    document.getElementById("welcomeText").innerText = "Welcome, " + name + "!";
}

/* START CAMERA */
function startCamera() {
    document.getElementById("homePage").classList.add("hidden");
    document.getElementById("cameraPage").classList.remove("hidden");

    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(() => {
            alert("Camera access denied or not supported.");
        });
}

/* CAPTURE IMAGE */
function captureImage() {
    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext("2d");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    document.getElementById("cameraPage").classList.add("hidden");
    document.getElementById("resultPage").classList.remove("hidden");

    analyzeFood();
}

/* AI SIMULATION */
function analyzeFood() {
    let results = [
        "SAFE ✅: Food is fresh and hygienic.",
        "WARNING ⚠️: Food exposed to contamination.",
        "UNSAFE ❌: High risk of bacteria detected.",
        "MODERATE ⚠️: Check storage conditions."
    ];

    let tips = [
        "Wash hands before eating.",
        "Store food in refrigerator.",
        "Avoid uncovered food.",
        "Cook at proper temperature."
    ];

    let randomResult = results[Math.floor(Math.random() * results.length)];
    let randomTip = tips[Math.floor(Math.random() * tips.length)];

    document.getElementById("resultText").innerText =
        randomResult + " Tip: " + randomTip;
}

/* VOICE OUTPUT */
function speakResult() {
    let text = document.getElementById("resultText").innerText;
    let speech = new SpeechSynthesisUtterance(text);
    speechSynthesis.speak(speech);
}

/* BACK TO HOME */
function goHome() {
    location.reload();
}
</script>

</body>
</html>
